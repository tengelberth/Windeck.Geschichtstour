name: Warmup Backend

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

env:
  APP_BASE_URL: https://geschichtstour-backend.azurewebsites.net
  HEALTH_PATH: /healthz

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping health endpoint
        shell: bash
        run: |
          set -euo pipefail
          url="${APP_BASE_URL}${HEALTH_PATH}"
          echo "Pinging ${url}"
          status=$(curl -L -sS -o /tmp/healthz-response.txt -w "%{http_code}" "$url")
          cat /tmp/healthz-response.txt
          echo
          if [ "$status" -ne 200 ]; then
            echo "Unexpected status code: $status"
            exit 1
          fi
